<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Calculadora</title>
    <link rel="stylesheet" href="../login/stiles.css">
</head>
<body>
    <main>
        <img id="ilustration" src="../images/ilustration.svg.svg" alt="Ilustração">
    </main>

    <section id="login">

        <h1>Faça o seu login</h1>

        <form id="login-form">

            <div>
                <input  id="input-email"type="email" placeholder="Digite seu e-mail">
            </div>

            <div>
                <input  id="senha" class="input-password" type="password" placeholder="Digite sua senha">
            </div>
              <p>
                 <a href="forgot-password.html">Esqueci minha senha</a>
             </p>


            <button id="entrar" type="submit">Entrar</button>

        </form> 
             <p>
            Não tem uma conta?
            <a href="register.html">Cadastre-se</a>
           </p>

    </section>
    <script src="login.js">

    </script>

</body>
</html>
