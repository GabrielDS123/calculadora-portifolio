<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
    href="calculate.css">
    <title>Calculadora</title>
</head>
<body>
    <header>
        <h1> calculadora</h1>
    </header>
    <main>
    <section>
        <div id="Resultado">
          <input id="display" type="text" readonly="">
        </div>
        <div class="line">
        <button class="parentese" onclick="clean()">C</button>
        <button class="parentese"onclick="insertToDisplay('(')" >()</button>
        <button class="parentese" onclick="insertToDisplay('%')">%</button>
        <button class ="operacoes"onclick="insertToDisplay('/')">÷</button>
      </div>
      <div class="line">
         <button class="numbers"onclick="insertToDisplay('7')">7</button>
         <button class="numbers"onclick="insertToDisplay('8')">8</button>
         <button class="numbers"onclick="insertToDisplay('9')">9</button>
         <button class="operacoes"onclick="insertToDisplay('*')">x</button>
      </div>
      <div class="line">
         <button class="numbers"onclick="insertToDisplay('6')">6</button>
         <button class="numbers"onclick="insertToDisplay('5')">5</button>
         <button class="numbers"onclick="insertToDisplay('4')" >4</button>
         <button class="operacoes"onclick="insertToDisplay('-')" >-</button>
      </div>
      <div class="line">
         <button class="numbers"onclick="insertToDisplay('1')" >1</button>
         <button class="numbers"onclick="insertToDisplay('2')" >2</button>
         <button class="numbers"onclick="insertToDisplay('3')">3</button>
         <button class="operacoes"onclick="insertToDisplay('+')">+</button>
      </div>
      <div class="line">
         <button class="numbers" onclick="apagar()">▶</button>
         <button class="numbers"onclick="insertToDisplay('0')">0</button>
         <button class="numbers" onclick="insertToDisplay('.')">.</button>
         <button class="calcular"onclick="calcular('')">=</button>
      </div>
    </section>
    </main>
    <script src="calculate.js"></script>
</body>
</html>
